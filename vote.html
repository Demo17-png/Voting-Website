<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cast Your Vote</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-center">
    <div class="card vote-card">
      <h1>Cast Your Vote</h1>
      <p class="subtitle">Select only one candidate for each position.</p>

      <form id="voteForm">
        <!-- President -->
        <div class="position-card">
          <h2>President</h2>
          <label class="candidate-option">
            <input type="radio" name="president" value="Adeolu Thomas" required />
            <span>Adeolu Thomas</span>
          </label>

          <label class="candidate-option">
            <input type="radio" name="president" value="Seun Babatunde" />
            <span>Seun Babatunde</span>
          </label>
        </div>

        <!-- Vice President -->
        <div class="position-card">
          <h2>Vice President</h2>
          <label class="candidate-option">
            <input type="radio" name="vicePresident" value="Kemi Jaja" required />
            <span>Kemi Jaja</span>
          </label>

          <label class="candidate-option">
            <input type="radio" name="vicePresident" value="Bola Kunmbi" />
            <span>Bola Kunmbi</span>
          </label>
        </div>

        <!-- Secretary -->
        <div class="position-card">
          <h2>Secretary</h2>
          <label class="candidate-option">
            <input type="radio" name="secretary" value="Bode Idowu" required />
            <span>Bode Idowu</span>
          </label>

          <label class="candidate-option">
            <input type="radio" name="secretary" value="Johnson Dada" />
            <span>Johnson Dada</span>
          </label>
        </div>

        <button type="submit" id="submitVoteBtn">Submit Vote</button>
        <p id="voteMessage" class="message"></p>
      </form>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <p>Submitting your vote...</p>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
